services:
  openrsvp:
    build: .
    ports:
      - "8091:8080"
    volumes:
      - openrsvp-data:/data
    env_file:
      - .env
    environment:
      - DB_DRIVER=sqlite
      - DB_DSN=/data/openrsvp.db
      - UPLOADS_DIR=/data/uploads
      - NOTIFICATION_EMAIL_PROVIDER=smtp
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@openrsvp.local
      - BASE_URL=http://localhost:8091
    networks:
      - openrsvp-net
    restart: unless-stopped

volumes:
  openrsvp-data:

networks:
  openrsvp-net:
    external: true
