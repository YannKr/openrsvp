<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>OpenRSVP — Beautiful Invitations, Zero Ads</title>
		<meta name="description" content="Create stunning event invitations and manage RSVPs. Self-hosted, privacy-first, and completely free." />
		<link rel="preload" href="/fonts/satoshi-700.woff2" as="font" type="font/woff2" crossorigin />
		<style>
			body { margin: 0; font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #FAFAF9; -webkit-font-smoothing: antialiased; }
			@keyframes spin { to { transform: rotate(360deg); } }
			.loading-spinner { width: 2rem; height: 2rem; border-radius: 50%; border: 2px solid transparent; border-bottom-color: #E54666; animation: spin 1s linear infinite; }
		</style>
		<script>
			(function(){var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')})()
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
